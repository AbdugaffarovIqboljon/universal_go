name: universal_go
description: "Universal Go App - A marketplace for local shops and customers"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  provider: ^6.1.2
  
  # Dependency Injection
  get_it: ^8.2.0
  injectable: ^2.5.2
  
  # Firebase
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_storage: ^13.0.3
  firebase_messaging: ^16.0.3
  
  # Maps
  yandex_mapkit: ^4.2.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  
  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  
  # HTTP & Network
  dio: ^5.9.0
  http: ^1.5.0
  
  # Utils
  intl: ^0.20.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  
  # UI Components
  flutter_svg: ^2.2.1
  shimmer: ^3.0.0
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  injectable_generator: ^2.6.2
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/